name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        id: tauri
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "NicTasks ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install this version."
          releaseDraft: true
          prerelease: false

      - name: Upload updater artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $bundleDir = "src-tauri/target/release/bundle"

          # Upload .sig files and .nsis.zip
          $files = @(
            "$bundleDir/nsis/NicTasks_$($tag.TrimStart('v'))_x64-setup.exe.sig",
            "$bundleDir/nsis/NicTasks_$($tag.TrimStart('v'))_x64-setup.nsis.zip",
            "$bundleDir/nsis/NicTasks_$($tag.TrimStart('v'))_x64-setup.nsis.zip.sig",
            "$bundleDir/msi/NicTasks_$($tag.TrimStart('v'))_x64_en-US.msi.sig",
            "$bundleDir/msi/NicTasks_$($tag.TrimStart('v'))_x64_en-US.msi.zip",
            "$bundleDir/msi/NicTasks_$($tag.TrimStart('v'))_x64_en-US.msi.zip.sig"
          )
          foreach ($f in $files) {
            if (Test-Path $f) {
              Write-Host "Uploading $f..."
              gh release upload $tag $f --clobber
            } else {
              Write-Host "Not found: $f"
            }
          }

          # Generate latest.json for the updater
          $version = $tag.TrimStart('v')
          $nsisZipSigPath = "$bundleDir/nsis/NicTasks_${version}_x64-setup.nsis.zip.sig"
          $msiZipSigPath = "$bundleDir/msi/NicTasks_${version}_x64_en-US.msi.zip.sig"

          $nsisSig = if (Test-Path $nsisZipSigPath) { Get-Content $nsisZipSigPath -Raw } else { "" }
          $msiSig = if (Test-Path $msiZipSigPath) { Get-Content $msiZipSigPath -Raw } else { "" }

          $latest = @{
            version = $version
            notes = "See the assets below to download and install this version."
            pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $nsisSig.Trim()
                url = "https://github.com/champnic/NicTasks/releases/download/$tag/NicTasks_${version}_x64-setup.nsis.zip"
              }
            }
          } | ConvertTo-Json -Depth 4

          $latest | Out-File -FilePath "latest.json" -Encoding utf8
          Write-Host "Generated latest.json:"
          Get-Content latest.json
          gh release upload $tag latest.json --clobber

      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
